<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tone Strike Labs | Dual-Logic Engine</title>
    <style>
        :root { --bg: #0b0c10; --panel: #1a1c23; --accent: #e53935; --safe: #00ff66; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; box-sizing: border-box; }
        
        .admin-header { width: 100%; max-width: 410px; background: #000; border: 1px solid #242731; border-radius: 8px; padding: 10px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .admin-status { display: flex; align-items: center; gap: 8px; color: var(--safe); font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .green-dot { width: 8px; height: 8px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 8px var(--safe); }
        
        .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 420px; }
        .app-container { background: var(--panel); padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid #2a2d37; }
        .ai-input { width: 90%; background: #0b0c10; border: 1px solid #333; color: var(--safe); font-size: 10px; padding: 5px; border-radius: 4px; height: 60px; resize: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 90%; font-size: 9px; text-transform: uppercase; margin-top: 5px; }
        
        .score-display { font-size: 24px; font-weight: bold; margin: 10px 0; color: var(--safe); }
        .content-box { display: none; background: #111; padding: 10px; border-radius: 5px; font-size: 9px; margin-top: 5px; color: #ccc; border: 1px solid #333; }
        .policy-link { color: #888; text-decoration: underline; font-size: 10px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-status"><div class="green-dot"></div> SYSTEM OPERATIONAL</div>
    </div>

    <div class="split-grid">
        <div class="app-container">
            <textarea class="ai-input" id="inputA" placeholder="AI Result A..."></textarea>
            <div id="scoreA" class="score-display">--%</div>
            <button class="btn" onclick="analyze('A')">Verify A</button>
        </div>
        <div class="app-container">
            <textarea class="ai-input" id="inputB" placeholder="AI Result B..."></textarea>
            <div id="scoreB" class="score-display">--%</div>
            <button class="btn" onclick="analyze('B')">Verify B</button>
        </div>
    </div>

    <script>
        function analyze(u) {
            let text = document.getElementById('input' + u).value.toLowerCase();
            if(text.length < 20) { alert("Input too short for logical integrity analysis."); return; }
            
            let score = 70; // Baseline
            
            // Filter 1: Emotional Bias Deductions
            const emotionalWords = ['hate', 'never', 'always', 'terrible', 'stupid', 'awful', 'destroy', 'angry'];
            emotionalWords.forEach(word => { if (text.includes(word)) score -= 8; });
            
            // Filter 2: Logical Connector Additions (The "Pro" Logic Markers)
            const logicalConnectors = ['because', 'therefore', 'consequently', 'evidence', 'data', 'proven', 'analysis', 'logic', 'fact'];
            logicalConnectors.forEach(word => { if (text.includes(word)) score += 12; });
            
            // Filter 3: Structural Integrity (length validation)
            if (text.length > 200) score += 5;
            
            let finalScore = Math.min(Math.max(score, 0), 100);
            document.getElementById('score' + u).innerText = finalScore + "%";
            document.getElementById('score' + u).style.color = finalScore > 75 ? "var(--safe)" : "#e53935";
        }
    </script>
</body>
</html>
